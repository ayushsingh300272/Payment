```html
<!DOCTYPE html>
<html>
<head>

<title>Transport Trip Manager</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<h1>Transport Trip Manager</h1>

<form id="tripForm">

<label>Transporter</label>
<select id="transporter">
<option>Andal Logistics</option>
<option>EFC Logistics</option>
</select>

<label>Vehicle Number</label>
<select id="truckNumber">
<option>1982</option>
<option>8218</option>
</select>

<label>Loading Date</label>
<input type="date" id="loadingDate" required>

<label>Unloading Date</label>
<input type="date" id="unloadingDate" required>

<label>Loading Point</label>
<select id="loadingPoint">
<option>Sanikpur</option>
<option>RP Shaw</option>
</select>

<label>Unloading Point</label>
<select id="unloadingPoint">
<option>Chiliyama</option>
<option>Sinni</option>
</select>

<label>Weight Loaded</label>
<input type="number" id="weightLoaded" step="any">

<label>Weight Delivered</label>
<input type="number" id="weightDelivered" step="any">

<label>Shortage Rate (₹ per ton/kg)</label>
<input type="number" id="shortageRate" step="any">

<label>Diesel Expense</label>
<input type="number" id="diesel" step="any">

<label>Driver Expense</label>
<input type="number" id="driver" step="any">

<button type="submit">Add Trip</button>

</form>


<h2>Trip Records</h2>

<table id="tripTable">

<thead>

<tr>

<th>Loading Date</th>
<th>Unloading Date</th>
<th>Transporter</th>
<th>Vehicle</th>
<th>Loading</th>
<th>Unloading</th>
<th>Loaded</th>
<th>Delivered</th>
<th>Shortage</th>
<th>Shortage Rate</th>
<th>Shortage Amount</th>
<th>Diesel</th>
<th>Driver</th>
<th>Total Expense</th>
<th>Payment</th>

</tr>

</thead>

<tbody></tbody>

</table>

<br>

<button onclick="downloadExcel()">Download Excel</button>

<script src="script.js"></script>

</body>
</html>
```
